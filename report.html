<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTI 情資報告全方位生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; background-color: #f1f5f9; }
        .form-input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.375rem; font-size: 0.875rem; }
        .form-input:focus { outline: none; border-color: #3b82f6; ring: 2px; ring-color: #bfdbfe; }
        .tab-btn { padding: 0.75rem 1rem; font-size: 0.875rem; font-weight: 500; color: #64748b; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .section-card { background: white; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; margin-bottom: 1.5rem; }
        .dynamic-row { display: grid; grid-template-columns: 1.5fr 1.5fr 3fr 40px; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- 頂部標題與操作按鈕 -->
        <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">CTI 情資報告全方位生成器</h1>
                <p class="text-slate-500">一鍵產出包含標頭、分析、IOC 與 ATT&CK 的完整報告</p>
            </div>
            <div class="flex gap-2">
                <button onclick="copyToClipboard()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-semibold shadow-sm transition-all active:scale-95">
                    <i data-lucide="copy" class="w-5 h-5"></i>
                    複製完整 Markdown
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 左側：編輯區域 -->
            <div class="lg:col-span-7">
                <!-- 導覽頁籤 -->
                <div class="flex border-b border-slate-200 mb-6 bg-white rounded-t-lg px-4 overflow-x-auto">
                    <button onclick="switchMainTab('header')" id="btn-header" class="tab-btn active whitespace-nowrap">1. 標頭與格式</button>
                    <button onclick="switchMainTab('content')" id="btn-content" class="tab-btn whitespace-nowrap">2. 摘要與分析</button>
                    <button onclick="switchMainTab('iocs')" id="btn-iocs" class="tab-btn whitespace-nowrap">3. IOCs & ATT&CK</button>
                    <button onclick="switchMainTab('ref')" id="btn-ref" class="tab-btn whitespace-nowrap">4. 參考連結</button>
                </div>

                <!-- 頁籤 1: 標頭資訊 -->
                <div id="panel-header" class="main-panel">
                    <div class="section-card">
                        <div class="flex items-center gap-2 mb-4 text-slate-800 font-bold border-b pb-2">
                            <i data-lucide="layout" class="w-5 h-5"></i>
                            報告格式切換
                        </div>
                        <div class="flex gap-4 mb-6">
                            <label class="flex items-center gap-2 cursor-pointer text-sm font-medium">
                                <input type="radio" name="reportMode" value="ransomware" onchange="handleModeChange(this.value)"> 勒索軟體 (14欄位)
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer text-sm font-medium">
                                <input type="radio" name="reportMode" value="general" checked onchange="handleModeChange(this.value)"> 一般情資 (10欄位)
                            </label>
                        </div>
                        <div id="headerFields" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- 由 JS 動態生成 -->
                        </div>
                    </div>
                </div>

                <!-- 頁籤 2: 內容分析 -->
                <div id="panel-content" class="main-panel hidden">
                    <div class="section-card">
                        <div class="flex items-center gap-2 mb-4 text-slate-800 font-bold border-b pb-2">
                            <i data-lucide="file-text" class="w-5 h-5"></i>
                            本文分析
                        </div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">報告摘要 (Abstract)</label>
                        <textarea id="abstract" class="form-input h-32 mb-4" placeholder="請輸入本報告的簡短摘要..."></textarea>

                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">技術分析 (Technical Analysis)</label>
                        <textarea id="analysis" class="form-input h-64 mb-4" placeholder="請輸入詳細的攻擊過程描述..."></textarea>
                        
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">偵測規則 (Detection Rules)</label>
                        <textarea id="detectionRules" class="form-input font-mono text-xs h-32" placeholder="例如 Snort 或 YARA 規則..."></textarea>
                    </div>
                </div>

                <!-- 頁籤 3: IOCs & ATT&CK -->
                <div id="panel-iocs" class="main-panel hidden">
                    <!-- 檔案 IOC -->
                    <div class="section-card">
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-sm font-bold text-slate-700 flex items-center gap-2">
                                <i data-lucide="file-warning" class="w-4 h-4"></i> 檔案整理列表
                            </label>
                            <button onclick="addRow('fileIoc')" class="text-xs bg-slate-800 text-white hover:bg-slate-700 px-3 py-1 rounded transition-colors">＋ 新增檔案</button>
                        </div>
                        <div id="fileIocContainer">
                            <!-- 檔案行 -->
                        </div>
                    </div>

                    <!-- 網路 IOC -->
                    <div class="section-card">
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-sm font-bold text-slate-700 flex items-center gap-2">
                                <i data-lucide="globe" class="w-4 h-4"></i> 網路指標 (IOCs)
                            </label>
                            <button onclick="addRow('netIoc')" class="text-xs bg-slate-800 text-white hover:bg-slate-700 px-3 py-1 rounded transition-colors">＋ 新增指標</button>
                        </div>
                        <div id="netIocContainer">
                            <!-- 指標行 -->
                        </div>
                    </div>

                    <!-- MITRE ATT&CK -->
                    <div class="section-card">
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-sm font-bold text-slate-700 flex items-center gap-2">
                                <i data-lucide="shield-alert" class="w-4 h-4"></i> MITRE ATT&CK 對照表
                            </label>
                            <button onclick="addRow('attck')" class="text-xs bg-slate-800 text-white hover:bg-slate-700 px-3 py-1 rounded transition-colors">＋ 新增技術</button>
                        </div>
                        <div id="attckContainer">
                            <!-- 技術行 -->
                        </div>
                    </div>
                </div>

                <!-- 頁籤 4: 參考資料 -->
                <div id="panel-ref" class="main-panel hidden">
                    <div class="section-card">
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-sm font-bold text-slate-700 flex items-center gap-2">
                                <i data-lucide="link" class="w-4 h-4"></i> 參考資料連結
                            </label>
                            <button onclick="addRow('refLink')" class="text-xs bg-slate-800 text-white hover:bg-slate-700 px-3 py-1 rounded transition-colors">＋ 新增連結</button>
                        </div>
                        <div id="refLinkContainer">
                            <!-- 連結行 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側：預覽區域 -->
            <div class="lg:col-span-5">
                <div class="bg-white rounded-xl shadow-lg border border-slate-200 sticky top-8 flex flex-col h-[calc(100vh-120px)]">
                    <div class="p-4 border-b flex items-center justify-between bg-slate-50 rounded-t-xl">
                        <div class="flex items-center gap-2 text-slate-700 font-bold">
                            <i data-lucide="scroll-text" class="w-5 h-5 text-blue-600"></i>
                            Markdown 即時預覽
                        </div>
                        <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold uppercase">Auto-Render</span>
                    </div>
                    <div id="fullPreview" class="p-6 overflow-y-auto flex-1 prose prose-slate prose-sm max-w-none">
                        <!-- Markdown 轉換後的 HTML 會顯示在此 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 成功提示彈窗 -->
    <div id="copyToast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-8 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 pointer-events-none flex items-center gap-2 z-50">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-green-400"></i>
        <span>報告已複製到剪貼簿！</span>
    </div>

    <script>
        // 初始狀態與數據 (預填範例)
        let currentMode = 'general';
        let fileIocs = [
            { name: '[NSIS].nsi', desc: 'NSIS 安裝腳本', hash: '8ea8b83645fba6e23d48075a0d3fc73ad2ba515b4536710cda4f1f232718f53e' },
            { name: 'BluetoothService.exe', desc: 'Bitdefender 程式（正常程式）', hash: '2da00de67720f5f13b17e9d985fe70f10f153da60c9ab1086fe58f069a156924' },
            { name: 'log.dll', desc: '惡意的 DLL 載入器', hash: '3bdc4c0637591533f1d4198a72a33426c01f69bd2e15ceee547866f65e26b7ad' }
        ];
        let netIocs = [
            { value: '95.179.213.0' },
            { value: 'api[.]skycloudcenter[.]com' },
            { value: 'api[.]wiresguard[.]com' }
        ];
        let attcks = [
            { id: 'T1204.002', name: 'User Execution: Malicious File' },
            { id: 'T1574.002', name: 'DLL Side-Loading' },
            { id: 'T1071.001', name: 'Web Protocols' }
        ];
        let refLinks = [
            { url: 'https://www.rapid7.com/blog/post/tr-chrysalis-backdoor-dive-into-lotus-blossoms-toolkit/' }
        ];

        const headerConfigs = {
            ransomware: [
                { id: 'reportId', label: '報告編號', value: 'NICS-260301-02' },
                { id: 'reportType', label: '報告類型', value: 'Flash Report' },
                { id: 'publishDate', label: '發布日期', value: '' },
                { id: 'confidence', label: '信心等級', type: 'select', options: ['高', '中', '低'], value: '中' },
                { id: 'threatLevel', label: '威脅等級', type: 'select', options: ['高', '中', '低'], value: '高' },
                { id: 'industry', label: '受影響產業', value: '能源、科技業' },
                { id: 'region', label: '受害地區', value: '台灣' },
                { id: 'actor', label: '駭客組織', value: '-' },
                { id: 'malwareName', label: '惡意程式名稱', value: 'COLDLOCK Ransomware' },
                { id: 'algorithm', label: '使用演算法', value: 'RSA 2048、AES' },
                { id: 'extension', label: '檔案副檔名', value: '`.locked`' },
                { id: 'ransomNote', label: 'Ransom note', value: '-' },
                { id: 'initialAccess', label: '初始入侵方式', value: '釣魚郵件' },
                { id: 'tlp', label: 'TLP', type: 'select', options: ['White', 'Green', 'Amber', 'Red'], value: 'Green' }
            ],
            general: [
                { id: 'reportId', label: '報告編號', value: 'NICS-260301-01' },
                { id: 'reportType', label: '報告類型', value: 'Flash Report' },
                { id: 'publishDate', label: '發布日期', value: '' },
                { id: 'confidence', label: '信心等級', type: 'select', options: ['高', '中', '低'], value: '中' },
                { id: 'threatLevel', label: '威脅等級', type: 'select', options: ['高', '中', '低'], value: '高' },
                { id: 'industry', label: '受影響產業', value: '金融、科技業、電信服務' },
                { id: 'region', label: '受害地區', value: '台灣、香港' },
                { id: 'actor', label: '駭客組織', value: 'Lotus Blossom' },
                { id: 'malwareName', label: '惡意程式名稱', value: 'Chrysalis' },
                { id: 'tlp', label: 'TLP', type: 'select', options: ['White', 'Green', 'Amber', 'Red'], value: 'Green' }
            ]
        };

        // 頁籤切換邏輯
        function switchMainTab(tab) {
            document.querySelectorAll('.main-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`panel-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active');
        }

        // 模式切換邏輯
        function handleModeChange(mode) {
            // 在切換前保存當前欄位的值到 config 裡 (雖然這是一個簡單實作)
            currentMode = mode;
            renderHeaderFields();
        }

        // 動態生成標頭輸入框
        function renderHeaderFields() {
            const container = document.getElementById('headerFields');
            const fields = headerConfigs[currentMode];
            container.innerHTML = fields.map(f => `
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">${f.label}</label>
                    ${f.type === 'select' ? `
                        <select id="h-${f.id}" oninput="updateAll()" class="form-input">
                            ${f.options.map(opt => `<option value="${opt}" ${f.value === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    ` : `
                        <input type="text" id="h-${f.id}" oninput="updateAll()" class="form-input" value="${f.value}">
                    `}
                </div>
            `).join('');
            updateAll();
        }

        // 動態行管理
        function addRow(type) {
            if (type === 'fileIoc') fileIocs.push({ name: '', desc: '', hash: '' });
            if (type === 'netIoc') netIocs.push({ value: '' });
            if (type === 'attck') attcks.push({ id: '', name: '' });
            if (type === 'refLink') refLinks.push({ url: '' });
            renderDynamicLists();
            updateAll();
        }

        function removeRow(type, index) {
            if (type === 'fileIoc') fileIocs.splice(index, 1);
            if (type === 'netIoc') netIocs.splice(index, 1);
            if (type === 'attck') attcks.splice(index, 1);
            if (type === 'refLink') refLinks.splice(index, 1);
            renderDynamicLists();
            updateAll();
        }

        function updateRowValue(type, index, field, value) {
            if (type === 'fileIoc') fileIocs[index][field] = value;
            if (type === 'netIoc') netIocs[index][field] = value;
            if (type === 'attck') attcks[index][field] = value;
            if (type === 'refLink') refLinks[index][field] = value;
            updateAll();
        }

        // 渲染動態列表介面
        function renderDynamicLists() {
            // 檔案整理
            document.getElementById('fileIocContainer').innerHTML = fileIocs.map((item, i) => `
                <div class="dynamic-row">
                    <input type="text" class="form-input text-[11px]" placeholder="檔名" value="${item.name}" oninput="updateRowValue('fileIoc', ${i}, 'name', this.value)">
                    <input type="text" class="form-input text-[11px]" placeholder="描述" value="${item.desc}" oninput="updateRowValue('fileIoc', ${i}, 'desc', this.value)">
                    <input type="text" class="form-input text-[11px] font-mono" placeholder="SHA256" value="${item.hash}" oninput="updateRowValue('fileIoc', ${i}, 'hash', this.value)">
                    <button onclick="removeRow('fileIoc', ${i})" class="text-slate-300 hover:text-red-500 transition-colors">✕</button>
                </div>
            `).join('');

            // 網路 IOC
            document.getElementById('netIocContainer').innerHTML = netIocs.map((item, i) => `
                <div class="flex gap-2 mb-2">
                    <input type="text" class="form-input text-xs" placeholder="IP / Domain (例如 api[.]skycloudcenter[.]com)" value="${item.value}" oninput="updateRowValue('netIoc', ${i}, 'value', this.value)">
                    <button onclick="removeRow('netIoc', ${i})" class="text-slate-300 hover:text-red-500 px-2 transition-colors">✕</button>
                </div>
            `).join('');

            // ATT&CK
            document.getElementById('attckContainer').innerHTML = attcks.map((item, i) => `
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="text" class="form-input text-xs" placeholder="ID (例如 T1574.002)" value="${item.id}" oninput="updateRowValue('attck', ${i}, 'id', this.value)">
                    <div class="flex gap-2">
                        <input type="text" class="form-input text-xs" placeholder="技術名稱" value="${item.name}" oninput="updateRowValue('attck', ${i}, 'name', this.value)">
                        <button onclick="removeRow('attck', ${i})" class="text-slate-300 hover:text-red-500 transition-colors">✕</button>
                    </div>
                </div>
            `).join('');

            // 參考資料
            document.getElementById('refLinkContainer').innerHTML = refLinks.map((item, i) => `
                <div class="flex gap-2 mb-2">
                    <input type="text" class="form-input text-xs" placeholder="URL 連結" value="${item.url}" oninput="updateRowValue('refLink', ${i}, 'url', this.value)">
                    <button onclick="removeRow('refLink', ${i})" class="text-slate-300 hover:text-red-500 px-2 transition-colors">✕</button>
                </div>
            `).join('');
        }

        // 生成最終 Markdown 字串
        function generateMarkdown() {
            let md = "";
            
            // 1. 標頭表格
            md += "| 欄位 | 內容 |\n|------|------|\n";
            headerConfigs[currentMode].forEach(f => {
                const val = document.getElementById(`h-${f.id}`)?.value || '-';
                md += `| ${f.label} | ${val} |\n`;
            });
            md += "\n";

            // 2. 摘要
            const abstract = document.getElementById('abstract').value;
            if (abstract) md += `# 摘要\n\n${abstract}\n\n`;

            // 3. 技術分析
            const analysis = document.getElementById('analysis').value;
            if (analysis) md += `# 技術分析\n\n${analysis}\n\n`;

            // 4. 檔案表格 (如果有的話)
            if (fileIocs.some(i => i.name || i.hash)) {
                md += `| 檔案名稱 | 檔案描述 | SHA256 |\n|---|---|---|\n`;
                fileIocs.forEach(i => {
                    if (i.name || i.hash) {
                        md += `| ${i.name || '-'} | ${i.desc || '-'} | ${i.hash || '-'} |\n`;
                    }
                });
                md += "\n";
            }

            // 5. 偵測規則
            const rules = document.getElementById('detectionRules').value;
            if (rules) md += `# 偵測規則\n\n\`\`\`\n${rules}\n\`\`\`\n\n`;

            // 6. 附錄：ATT&CK
            if (attcks.some(a => a.id)) {
                md += `# 附錄\n\n## MITRE ATT&CK\n\n| ATT&CK ID | Name |\n|---|---|\n`;
                attcks.forEach(a => {
                    if (a.id) md += `| ${a.id} | ${a.name || '-'} |\n`;
                });
                md += "\n";
            }

            // 7. IOC (網路)
            if (netIocs.some(n => n.value)) {
                md += `## IOC 網路指標\n\n| Indicator |\n|---|\n`;
                netIocs.forEach(n => {
                    if (n.value) md += `| ${n.value} |\n`;
                });
                md += "\n";
            }

            // 8. Reference
            if (refLinks.some(r => r.url)) {
                md += `## Reference\n\n`;
                refLinks.forEach(r => {
                    if (r.url) md += `- ${r.url}\n`;
                });
                md += "\n";
            }

            return md;
        }

        // 更新預覽畫面
        function updateAll() {
            const md = generateMarkdown();
            const previewContainer = document.getElementById('fullPreview');
            
            // 簡易的 Markdown -> HTML 預覽渲染
            const finalHtml = md.split('\n\n').map(part => {
                if (part.startsWith('|')) {
                    const rows = part.trim().split('\n');
                    let tableHtml = '<div class="overflow-x-auto my-4"><table class="w-full border-collapse border border-slate-200 text-xs">';
                    rows.forEach((row, i) => {
                        if (row.includes('---')) return;
                        const cols = row.split('|').filter((c, idx) => idx > 0 && idx < row.split('|').length - 1);
                        tableHtml += `<tr class="${i===0?'bg-slate-100 font-bold':''}">`;
                        cols.forEach(col => tableHtml += `<td class="border border-slate-200 p-2">${col.trim()}</td>`);
                        tableHtml += '</tr>';
                    });
                    tableHtml += '</table></div>';
                    return tableHtml;
                }
                if (part.startsWith('# ')) return `<h1 class="text-xl font-bold border-b-2 border-slate-200 pb-1 mb-3 mt-8 text-slate-800">${part.substring(2)}</h1>`;
                if (part.startsWith('## ')) return `<h2 class="text-lg font-bold border-b border-slate-100 pb-1 mb-3 mt-6 text-slate-700">${part.substring(3)}</h2>`;
                if (part.startsWith('```')) return `<pre class="bg-slate-800 text-blue-300 p-4 rounded-lg text-[10px] my-4 font-mono whitespace-pre-wrap leading-relaxed">${part.replace(/```/g, '')}</pre>`;
                if (part.startsWith('- ')) {
                    const items = part.split('\n').map(li => `<li class="ml-4 list-disc">${li.substring(2)}</li>`).join('');
                    return `<ul class="my-2">${items}</ul>`;
                }
                return `<p class="my-3 leading-relaxed text-slate-600 text-sm">${part}</p>`;
            }).join('');

            previewContainer.innerHTML = finalHtml;
            window.lastMd = md; // 存到全域變數方便複製
        }

        // 複製到剪貼簿
        function copyToClipboard() {
            const el = document.createElement('textarea');
            el.value = window.lastMd;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById('copyToast');
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0px)';
            }, 3000);
        }

        // 初始化
        window.onload = () => {
            lucide.createIcons();
            
            // 設定初始日期
            const now = new Date();
